<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owl Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e1e1e; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; border: 1px solid #333; }
        h1 { color: #fff; margin-bottom: 1rem; }
        .status { display: inline-block; padding: 0.5rem 1rem; background: #2e7d32; color: white; border-radius: 20px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Owl System Dashboard</h1>
        <p>Status: <span class="status">Operational</span></p>
        <p>Agent: <strong>Owl</strong></p>
        <p>User: <strong>Boss</strong></p>
    </div>
</body>
</html>
